name: Release Skills

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10 # For changelog generation

      - name: Generate version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="$(date +%Y.%m.%d)-${SHORT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"
          # Write generated version back into config.json before packaging
          jq --arg v "$VERSION" '.version = $v' skillboss/config.json > /tmp/config.tmp && mv /tmp/config.tmp skillboss/config.json

      - name: Generate changelog from commits
        id: changelog
        run: |
          CHANGELOG=$(git log --oneline -10 --pretty=format:"- %s" | head -10)
          # Use delimiter for multiline output
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "📝 Changelog:"
          echo "$CHANGELOG"

      - name: Create zip
        run: |
          [ -d sub-packs/skillboss-image ] && cp -r sub-packs/skillboss-image ./skillboss-image
          [ -d sub-packs/skillboss-video ] && cp -r sub-packs/skillboss-video ./skillboss-video
          zip -r skillboss.zip skillboss/ $([ -d skillboss-image ] && echo skillboss-image/) $([ -d skillboss-video ] && echo skillboss-video/)
          echo "📁 Zip size: $(du -h skillboss.zip | cut -f1)"

      - name: Calculate file hash
        id: hash
        run: |
          HASH=$(sha256sum skillboss.zip | cut -d' ' -f1)
          SIZE=$(stat -c%s skillboss.zip)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "🔒 SHA256: $HASH"
          echo "📏 Size: $SIZE bytes"

      - name: Upload to R2
        run: |
          npx wrangler r2 object put skillboss/versions/${{ steps.version.outputs.version }}.zip --file=skillboss.zip --remote

      - name: Notify skillboss webhook
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          jq -n \
            --arg version "${{ steps.version.outputs.version }}" \
            --arg r2_key "versions/${{ steps.version.outputs.version }}.zip" \
            --argjson file_size ${{ steps.hash.outputs.size }} \
            --arg file_hash "${{ steps.hash.outputs.hash }}" \
            --arg changelog "$CHANGELOG" \
            --arg commit_sha "${{ github.sha }}" \
            '{version: $version, r2_key: $r2_key, file_size: $file_size, file_hash: $file_hash, changelog: $changelog, commit_sha: $commit_sha}' \
            > payload.json
          curl -f -X POST "${{ secrets.SKILLBOSS_WEBHOOK_URL }}/api/skills/webhook/release" \
            -H "Authorization: Bearer ${{ secrets.SKILLBOSS_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d @payload.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        continue-on-error: true # Don't fail if tag exists
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ---
            📦 Also available via [skillboss.co](https://skillboss.co)
          files: skillboss.zip
          generate_release_notes: false
